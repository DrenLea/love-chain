<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>暖心故事 · 爱心链</title>
<link rel="stylesheet" href="css/style.css" />
<script>
  (function () {
    const params = new URLSearchParams(location.search);
    const forced = params.get('view');
    const isMobileUA = /Android|iPhone|iPod|IEMobile|BlackBerry|Opera Mini/i.test(navigator.userAgent || '');
    const wide = window.matchMedia && window.matchMedia('(min-width: 900px)').matches;
    let mode = 'app';
    if (forced === 'web') mode = 'web';
    else if (forced === 'app') mode = 'app';
    else if (!isMobileUA && wide) mode = 'web';
    document.documentElement.dataset.view = mode;
  })();
</script>
<style>
  html, body { height: 100%; background: #000; }
  .story-slide .fallback {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
  }
  .story-slide .fallback .emoji { font-size: 110px; opacity: 0.9; }
  .story-slide .fallback .stage-title {
    font-family: 'ZCOOL KuaiLe', sans-serif;
    color: #fff; font-size: 22px; letter-spacing: 2px;
    background: rgba(0,0,0,0.4); padding: 6px 20px; border-radius: 999px;
  }
  .story-tap-zones { position: absolute; inset: 0; display: flex; z-index: 4; }
  .story-tap-zones div { flex: 1; }
  .share-fab {
    position: absolute; bottom: 26px; right: 16px; z-index: 6;
    background: #fff; border: 2.5px solid #3a2f2a;
    border-radius: 999px; padding: 10px 18px;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    letter-spacing: 1px;
    font-size: 14px;
    box-shadow: 3px 3px 0 #3a2f2a;
    display: flex; align-items: center; gap: 6px;
  }
  /* 结束卡 · 打卡照片墙 */
  .story-slide.finale {
    background: repeating-linear-gradient(45deg, #ffe8d1 0 24px, #ffd6b0 24px 48px);
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 40px 16px 30px;
  }
  .story-slide.finale .photo-wall {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 0;
    align-content: start;
  }
  .story-slide.finale .photo-wall .ph {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #fff center/cover no-repeat;
    border: 3px solid #3a2f2a;
    border-radius: 10px;
    box-shadow: 3px 3px 0 #3a2f2a;
    transform: rotate(-2deg);
  }
  .story-slide.finale .photo-wall .ph:nth-child(2n) { transform: rotate(2deg); }
  .story-slide.finale .photo-wall .ph:nth-child(3n) { transform: rotate(-1deg); }
  .story-slide.finale .photo-wall .ph .tag {
    position: absolute; bottom: -8px; left: 50%;
    transform: translateX(-50%);
    background: #fff;
    border: 2px solid #3a2f2a;
    padding: 1px 8px;
    border-radius: 999px;
    font-size: 10px;
    white-space: nowrap;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    box-shadow: 1px 1px 0 #3a2f2a;
  }
  .story-slide.finale .story-caption {
    background: transparent;
    color: #3a2f2a;
    text-align: center;
    padding: 12px 8px 4px;
    font-family: 'ZCOOL KuaiLe', sans-serif;
    letter-spacing: 1px;
  }
  .story-slide.finale .story-caption b { color: #d94b6a; }
</style>
</head>
<body>
  <div class="story-scene" id="storyScene">
    <div class="story-progress" id="storyProgress"></div>
    <div id="slidesContainer"></div>
    <div class="story-tap-zones">
      <div id="tapPrev"></div>
      <div id="tapNext"></div>
    </div>
    <button class="share-fab" id="shareBtn">📤 生成分享海报</button>
  </div>

  <div class="share-panel" id="sharePanel">
    <button class="close-share" id="closeShare">✕</button>
    <h3>把这条爱心之旅分享出去</h3>

    <div class="poster" id="poster">
      <div class="header-ribbon">❤️ LOVE CHAIN · 爱心链</div>
      <div class="title">一条正在发生的爱心之旅</div>
      <div class="subtitle" id="posterActors"></div>

      <div class="avatars" id="posterAvatars"></div>

      <!-- AI 生成的配图（生成前隐藏） -->
      <div class="ai-art" id="aiArt" style="display:none;">
        <img id="aiArtImg" alt="AI 爱心海报配图" />
        <span class="ai-badge">🎨 AI 生成</span>
      </div>

      <div class="qr-box"><div id="posterQrBox"></div></div>
      <div class="subtitle">扫码查看完整暖心故事</div>

      <div class="stamp">爱心<br/>认证</div>
    </div>

    <button class="btn btn-warm" style="max-width:280px;margin-top:14px;" id="aiPosterBtn">
      🎨 AI 生成专属爱心海报
    </button>
    <div class="muted" id="aiStatus" style="margin-top:6px;font-size:12px;min-height:18px;"></div>

    <div class="share-hint">
      长按海报图片保存到相册，或直接截图分享到朋友圈 / 社群
    </div>

    <button class="btn btn-primary" style="max-width:280px;margin-top:16px;" id="saveBtn">
      📷 保存海报到相册
    </button>
    <a class="btn btn-secondary" id="storyBackLink" style="max-width:280px;margin-top:10px;" href="app.html">
      🏠 返回首页选择其它身份
    </a>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="data.js"></script>
  <script src="js/state.js"></script>
  <script src="config.js" onerror="console.warn('config.js 缺失，AI 海报按钮将提示配置')"></script>
  <script>
    // ?task=xxx → 故事页播对应任务的链条（默认主任务 T1）
    const storyTaskId = new URLSearchParams(location.search).get('task') || 'T1';
    ChainState.use(storyTaskId);

    // 一条爱心链 = 7 个分镜 + 1 张结束卡；所有文案/emoji 复用 TASK_STAGES（DRY）
    function buildSlides() {
      const done = ChainState.getStages();
      const findPayload = (id) => {
        const rec = done.find((c) => c.id === id);
        return rec ? rec.payload || {} : null;
      };
      // blob: 是修复前的死链接（只在原页面有效），当作没有照片
      const validPhoto = (p) => (p && p.photo && !p.photo.startsWith('blob:')) ? p.photo : null;
      const slides = TASK_STAGES.map((stage) => {
        const payload = findPayload(stage.id);
        let caption = `<b>${stage.actor}</b> ${stage.verb}`;
        if (stage.id === 'posted' && payload && payload.message) {
          caption += `<br>“${payload.message}”`;
        }
        if (stage.id === 'delivered' && payload && payload.thanks) {
          caption += `<br>“${payload.thanks}”`;
        }
        const photo = validPhoto(payload);
        return { stage, caption, photo };
      });
      const photos = TASK_STAGES.map((s) => {
        const p = findPayload(s.id);
        const ph = validPhoto(p);
        return ph ? { photo: ph, stage: s } : null;
      }).filter(Boolean);
      slides.push({
        stage: { emoji: '🏅', color: '#F9B942', title: '爱心链完成', actor: '爱心链', avatar: '❤️' },
        caption: photos.length
          ? `<b>这条爱心链已完整点亮</b><br>${photos.length} 张打卡照凑成了这段旅程 ❤️`
          : '<b>这条爱心链已完整点亮</b><br>感谢每一位让善意抵达的人 ❤️',
        photo: null,
        finale: true,
        photoWall: photos,
      });
      return slides;
    }

    let current = 0;
    let slides = [];
    let timer = null;

    function renderProgressBars() {
      const bar = document.getElementById('storyProgress');
      bar.innerHTML = slides.map((_, i) =>
        `<span class="${i < current ? 'done' : i === current ? 'active' : ''}"><i></i></span>`
      ).join('');
    }

    function renderSlide() {
      const container = document.getElementById('slidesContainer');
      container.innerHTML = '';
      slides.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'story-slide' + (i === current ? ' active' : '')
                      + (s.finale ? ' finale' : '');
        if (s.photo) {
          div.style.backgroundImage = `url(${s.photo})`;
        } else {
          // 温暖手绘渐变兜底
          div.style.background = `linear-gradient(160deg, ${s.stage.color}dd, ${s.stage.color}55 60%, #101425)`;
        }
        // 结束卡：上方拼图墙 + 下方文案
        if (s.finale && s.photoWall && s.photoWall.length) {
          div.innerHTML = `
            <div class="photo-wall">
              ${s.photoWall.map(({photo, stage}) =>
                `<div class="ph" style="background-image:url(${photo})">
                   <span class="tag">${stage.emoji} ${stage.title}</span>
                 </div>`
              ).join('')}
            </div>
            <div class="story-caption">${s.caption}</div>
          `;
        } else {
          div.innerHTML = `
            ${!s.photo ? `
              <div class="fallback">
                <div class="emoji">${s.stage.emoji || s.stage.avatar}</div>
                <div class="stage-title">${s.stage.title}</div>
              </div>
            ` : ''}
            <div class="story-caption">${s.caption}</div>
          `;
        }
        container.appendChild(div);
      });
      renderProgressBars();
    }

    function goTo(i) {
      clearTimeout(timer);
      if (i < 0) i = 0;
      if (i >= slides.length) { openShare(); return; }
      current = i;
      renderSlide();
      timer = setTimeout(() => goTo(current + 1), 3200);
    }

    document.getElementById('tapPrev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('tapNext').addEventListener('click', () => goTo(current + 1));

    function openShare() {
      clearTimeout(timer);
      document.getElementById('sharePanel').classList.add('show');

      // 海报头像链：从 ROLES 里取除 watcher 外的四位（DRY）
      const cast = ROLES.filter((r) => r.id !== 'watcher');
      document.getElementById('posterAvatars').innerHTML =
        cast.map((r, i) => `${r.emoji}${i < cast.length - 1 ? '<span class="arr">→</span>' : ''}`).join('');
      document.getElementById('posterActors').textContent =
        cast.map((r) => r.name).join(' · ');

      const box = document.getElementById('posterQrBox');
      box.innerHTML = '';
      new QRCode(box, { text: STORY_URL, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.H });
    }
    document.getElementById('shareBtn').addEventListener('click', openShare);
    document.getElementById('closeShare').addEventListener('click', () => {
      document.getElementById('sharePanel').classList.remove('show');
      renderSlide();
    });
    document.getElementById('saveBtn').addEventListener('click', () => {
      alert('提示：长按海报图片即可保存到相册；Demo 环境请直接截图后分享 ✨');
    });

    slides = buildSlides();
    goTo(0);

    // 根据 view=web 修正返回链接
    if (document.documentElement.dataset.view === 'web') {
      document.getElementById('storyBackLink').setAttribute('href', 'web.html');
    }

    /* ================================================================
     * 🎨 AI 生成爱心海报
     * prompt = 手绘暖风基底 + 任务类型 + 已完成的步骤 + 寄语/感谢语
     * 走 OpenAI 兼容 /v1/images/generations（config.js 提供网关和 key）
     * ================================================================ */
    function buildPosterPrompt() {
      const task = findTaskById(storyTaskId);
      const done = ChainState.getStages();
      const get = (id) => { const r = done.find((c) => c.id === id); return r ? r.payload || {} : null; };

      // 任务类型 → 场景描述
      const typeScene = {
        donation: 'a gift box full of warm clothes and books being passed along',
        need: 'a small rural school receiving a long-awaited care package',
        carry: 'a cheerful delivery truck and a scooter carrying a parcel through town and countryside',
        completed: 'a completed chain of hearts glowing above a happy village',
      };
      const scene = typeScene[(task && task.type) || 'donation'] || typeScene.donation;

      // 已完成步骤 → 分镜元素
      const stageBits = [];
      if (get('posted'))    stageBits.push('a handwritten love letter');
      if (get('matched'))   stageBits.push('two hands connecting across a map');
      if (get('reviewed'))  stageBits.push('a circle of thirty tiny smiling faces giving five-star ratings');
      if (get('leg1'))      stageBits.push('a truck driving through a mountain road at dawn');
      if (get('leg2'))      stageBits.push('a scooter handing over a parcel at a relay point');
      if (get('delivered')) stageBits.push('children joyfully opening a box');
      if (get('certified')) stageBits.push('a golden heart-shaped medal stamp');

      // 寄语 / 感谢语给氛围
      const msg = (get('posted') || {}).message || '';
      const thanks = (get('delivered') || {}).thanks || '';

      return [
        'Hand-drawn warm charity poster illustration, crayon and colored pencil style,',
        'paper texture background, warm coral pink and amber palette, soft rounded shapes,',
        `main scene: ${scene},`,
        stageBits.length ? `story moments: ${stageBits.join(', ')},` : '',
        'a chain of small hearts linking all elements together,',
        msg ? `mood inspired by the message "${msg}",` : '',
        thanks ? `gratitude inspired by "${thanks}",` : '',
        'cozy heartwarming children book style, no text, no words, no letters',
      ].filter(Boolean).join(' ');
    }

    async function generateAiPoster() {
      const btn = document.getElementById('aiPosterBtn');
      const status = document.getElementById('aiStatus');
      const cfg = window.LOVECHAIN_AI;
      if (!cfg || !cfg.apiKey || cfg.apiKey.startsWith('sk-xxxx')) {
        status.textContent = '⚠️ 未配置 AI key：复制 config.example.js 为 config.js 并填入 key';
        return;
      }
      btn.disabled = true;
      btn.textContent = '🎨 AI 绘制中…约 20 秒';
      status.textContent = '正在把这条爱心链的故事画成海报…';
      try {
        const res = await fetch(`${cfg.baseUrl}/images/generations`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${cfg.apiKey}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            model: cfg.imageModel || 'dall-e-3',
            prompt: buildPosterPrompt(),
            n: 1,
            size: '1024x1024',
          }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          throw new Error((data.error && data.error.message) || `HTTP ${res.status}`);
        }
        const item = (data.data && data.data[0]) || {};
        const src = item.url || (item.b64_json ? `data:image/png;base64,${item.b64_json}` : null);
        if (!src) throw new Error('接口没有返回图片');
        const img = document.getElementById('aiArtImg');
        img.onload = () => {
          document.getElementById('aiArt').style.display = 'block';
          btn.textContent = '🔄 换一张 AI 海报';
          btn.disabled = false;
          status.textContent = '✨ 生成完毕！长按图片可保存';
        };
        img.onerror = () => { throw new Error('图片加载失败'); };
        img.src = src;
      } catch (e) {
        btn.disabled = false;
        btn.textContent = '🎨 AI 生成专属爱心海报';
        status.textContent = `😢 生成失败：${e.message}（可以再点一次重试）`;
      }
    }
    document.getElementById('aiPosterBtn').addEventListener('click', generateAiPoster);
  </script>
</body>
</html>
